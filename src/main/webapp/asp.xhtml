<?xml version="1.0" encoding="UTF-8" ?>
<!-- Lady Katherine Rojas Mendivelso -->
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <meta charset="UTF-8" />
    <title>Registro de Aspirantes - RojasWebUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <h:outputStylesheet name="css/estilos.css"/>
</h:head>

<h:body>
    <div class="container py-4">
        <h:form>
            <h:messages globalOnly="true" showSummary="true" showDetail="true" styleClass="alert alert-warning"/>

            <div class="card form-card mx-auto" style="max-width: 900px;">
                <div class="card-header text-center py-3">
                    <h3 class="mb-0">Formulario aspirante</h3>
                </div>
                <div class="card-body p-4">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Identificacion</label>
                            <h:inputText id="id_p" value="#{asp.dto.id_p}" required="true"
                                requiredMessage="La identificacion es obligatoria."
                                validatorMessage="La identificacion debe contener entre 6 y 12 digitos."
                                styleClass="form-control">
                                <f:validateRegex pattern="^[0-9]{6,12}$"/>
                            </h:inputText>
                            <h:message for="id_p" styleClass="text-danger"/>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Nombres</label>
                            <h:inputText id="nombres" value="#{asp.dto.nombres}" required="true"
                                requiredMessage="Los nombres son obligatorios."
                                validatorMessage="Los nombres solo pueden tener letras y espacios."
                                styleClass="form-control">
                                <f:validateRegex pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ ]{2,60}$"/>
                            </h:inputText>
                            <h:message for="nombres" styleClass="text-danger"/>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Apellidos</label>
                            <h:inputText id="apellidos" value="#{asp.dto.apellidos}" required="true"
                                requiredMessage="Los apellidos son obligatorios."
                                validatorMessage="Los apellidos solo pueden tener letras y espacios."
                                styleClass="form-control">
                                <f:validateRegex pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ ]{2,60}$"/>
                            </h:inputText>
                            <h:message for="apellidos" styleClass="text-danger"/>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Correo</label>
                            <h:inputText id="correo" value="#{asp.dto.correo}" required="true"
                                requiredMessage="El correo es obligatorio."
                                validatorMessage="Ingrese un correo valido (ejemplo: nombre@correo.com)."
                                styleClass="form-control">
                                <f:validateRegex pattern="^[\w.-]+@[\w.-]+\.[a-zA-Z]{2,}$"/>
                            </h:inputText>
                            <h:message for="correo" styleClass="text-danger"/>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Telefono</label>
                            <h:inputText id="telefono" value="#{asp.dto.telefono}" required="true"
                                requiredMessage="El telefono es obligatorio."
                                validatorMessage="El telefono debe contener 7 a 10 digitos."
                                styleClass="form-control">
                                <f:validateRegex pattern="^[0-9]{7,10}$"/>
                            </h:inputText>
                            <h:message for="telefono" styleClass="text-danger"/>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Programa academico interesado</label>
                            <h:selectOneMenu id="pro_aca" value="#{asp.codPrograma}" required="true"
                                requiredMessage="Debe seleccionar un programa academico." styleClass="form-select">
                                <f:selectItem itemLabel="-- Seleccione --" itemValue="-1" noSelectionOption="true"/>
                                <f:selectItems value="#{asp.listaPa}" var="p"
                                    itemValue="#{asp.listaPa.indexOf(p)}"
                                    itemLabel="#{p.nombre_prog}"/>
                            </h:selectOneMenu>
                            <h:message for="pro_aca" styleClass="text-danger"/>
                        </div>
                    </div>

                    <div class="d-flex flex-wrap gap-2 mt-4">
                        <h:commandButton value="Registrar aspirante" action="#{asp.registrar}" styleClass="btn btn-kaths"/>
                        <h:outputLink value="#{request.contextPath}/index.xhtml" styleClass="btn btn-outline-kaths">
                            Volver al inicio
                        </h:outputLink>
                    </div>
                </div>
            </div>

            <div class="card table-card mt-4">
                <div class="card-header text-center py-3">
                    <h4 class="mb-0">Vista administrador - listado de estudiantes registrados</h4>
                </div>
                <div class="card-body table-responsive">
                    <h:dataTable value="#{asp.listaAs}" var="a" varStatus="status"
                        styleClass="table table-hover table-bordered align-middle text-center">
                        <h:column>
                            <f:facet name="header">#</f:facet>
                            <h:outputText value="#{status.index + 1}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Identificacion</f:facet>
                            <h:outputText value="#{a.id_p}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Nombres</f:facet>
                            <h:outputText value="#{a.nombres}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Apellidos</f:facet>
                            <h:outputText value="#{a.apellidos}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Correo</f:facet>
                            <h:outputText value="#{a.correo}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Telefono</f:facet>
                            <h:outputText value="#{a.telefono}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Programa</f:facet>
                            <h:outputText value="#{a.pro_acad.nombre_prog}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Fecha y hora registro</f:facet>
                            <h:outputText value="#{a.fecha_reg}">
                                <f:convertDateTime pattern="yyyy-MM-dd HH:mm:ss" type="localDateTime"/>
                            </h:outputText>
                        </h:column>
                    </h:dataTable>
                </div>
            </div>
        </h:form>
    </div>

    <footer class="text-center mt-4 p-3 footer-kaths">
        <h:outputText value="Lady Katherine Rojas Mendivelso - programacion avanzada - grupo 301 - Universidad Distrital Francisco Jose de Caldas - 2026"/>
    </footer>
</h:body>
</html>
